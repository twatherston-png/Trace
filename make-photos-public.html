<!DOCTYPE html>
<html>
<head>
    <title>Make Photos Public - SQL</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #D4AF37;
        }
        pre {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #6B4D8E;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        button {
            background: #6B4D8E;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #8B6DB0;
        }
        .success {
            color: #4CAF50;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Make Photos Public</h1>
    <p>Copy this SQL and paste it into Supabase SQL Editor:</p>
    
    <pre id="sql">UPDATE storage.buckets
SET public = true
WHERE name = 'photos';

CREATE POLICY "Public read access for photos"
ON storage.objects
FOR SELECT
TO public
USING (bucket_id = 'photos');</pre>
    
    <button onclick="copySQL()">Copy SQL</button>
    <div class="success" id="success">✓ Copied to clipboard!</div>
    
    <script>
        function copySQL() {
            const sql = document.getElementById('sql').innerText;
            navigator.clipboard.writeText(sql).then(() => {
                const success = document.getElementById('success');
                success.style.display = 'block';
                setTimeout(() => {
                    success.style.display = 'none';
                }, 3000);
            });
        }
    </script>
</body>
</html>
