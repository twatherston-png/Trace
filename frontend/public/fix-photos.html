<!DOCTYPE html>
<html>
<head>
    <title>Fix Photos SQL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        pre {
            background: #0f0f23;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin: 20px auto;
            max-width: 600px;
        }
        button {
            background: #6B4D8E;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:active {
            background: #8B6DB0;
        }
        .success {
            color: #4CAF50;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Fix Photos SQL</h1>
    <p>Click the button to copy, then paste into Supabase SQL Editor</p>
    
    <pre id="sql">UPDATE storage.buckets
SET public = true
WHERE name = 'photos';

CREATE POLICY public_read_photos
ON storage.objects
FOR SELECT
TO public
USING (bucket_id = 'photos');</pre>
    
    <button onclick="copySQL()">Copy SQL</button>
    <div class="success" id="success">✓ Copied!</div>
    
    <script>
        function copySQL() {
            const sql = document.getElementById('sql').innerText;
            navigator.clipboard.writeText(sql).then(() => {
                document.getElementById('success').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('success').style.display = 'none';
                }, 3000);
            });
        }
    </script>
</body>
</html>
