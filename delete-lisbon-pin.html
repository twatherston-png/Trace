<!DOCTYPE html>
<html>
<head>
  <title>Delete Lisbon Pin</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #1a0e2e;
      color: white;
    }
    button {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      opacity: 0.9;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
    }
    .success {
      background: rgba(46, 204, 113, 0.2) !important;
      border: 1px solid #2ecc71;
    }
    .error {
      background: rgba(231, 76, 60, 0.2) !important;
      border: 1px solid #e74c3c;
    }
  </style>
</head>
<body>
  <h1>Delete Lisbon Pin</h1>
  <p>This will delete the Lisbon Airport pin that has a photo attached.</p>
  
  <button onclick="deletePin()">Delete Lisbon Pin</button>
  
  <div id="status"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://baunrordpbmquujmjivs.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhdW5yb3JkcGJtcXV1am1qaXZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNzkzMTcsImV4cCI6MjA5Nzg1NTMxN30._GBUtR5KfadP0md1BF-SnvQA51kBRGoA-kuUTnotnbs'
    )

    window.deletePin = async function() {
      const status = document.getElementById('status')
      status.className = ''
      status.textContent = 'Finding Lisbon pin...'

      try {
        // Find pins with Lisbon in the location
        const { data: pins, error: findError } = await supabase
          .from('pins')
          .select('*')
          .ilike('location', '%Lisbon%')

        if (findError) throw findError

        if (!pins || pins.length === 0) {
          status.className = 'error'
          status.textContent = 'No Lisbon pins found'
          return
        }

        status.textContent = `Found ${pins.length} Lisbon pin(s). Deleting...`

        // Delete all Lisbon pins
        const { error: deleteError } = await supabase
          .from('pins')
          .delete()
          .ilike('location', '%Lisbon%')

        if (deleteError) throw deleteError

        status.className = 'success'
        status.textContent = `✓ Deleted ${pins.length} Lisbon pin(s). Refresh the app to see the changes.`
      } catch (error) {
        status.className = 'error'
        status.textContent = 'Error: ' + error.message
      }
    }
  </script>
</body>
</html>
